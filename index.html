<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MQTT Pro | Redes</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="card">
        <header class="app-header">
            <div id="status-dot" class="dot disconnected"></div>
            <div class="profile-section">
                <label for="profileInput">
                    <img id="profilePreview" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="profile-pic" title="Cambiar foto de perfil">
                </label>
                <input type="file" id="profileInput" accept="image/*" style="display:none" onchange="updateProfilePic(this)">
            </div>
            <input type="text" id="userInput" placeholder="Escribe tu nombre..." class="user-tag-input">
        </header>

        <div id="chat-box">
            <div class="welcome-msg">Conectando al servidor...</div>
        </div>

        <div class="input-group">
            <label class="attach-btn" title="Enviar imagen o GIF">
                +
                <input type="file" id="fileInput" accept="image/png, image/gif, image/jpeg" style="display:none" onchange="sendImage(this)">
            </label>
            <input type="text" id="mensajeInput" placeholder="Escribe un mensaje..." onkeypress="if(event.key==='Enter') enviar()">
            <button onclick="enviar()">➤</button>
        </div>
    </div>
</div>

<script>
    const BROKER = "broker.hivemq.com";
    const PORT = 8884; 
    const TOPIC = "clase/redes/equipo2/whatsapp_final_v2"; 
    const MI_TECNICO_ID = "CL_" + Math.random().toString(16).substr(2, 4).toUpperCase();
    let miFotoBase64 = "https://cdn-icons-png.flaticon.com/512/149/149071.png";

    const client = new Paho.MQTT.Client(BROKER, PORT, "client_" + MI_TECNICO_ID);

    client.onMessageArrived = (message) => {
        const chat = document.getElementById("chat-box");
        let data;
        try {
            data = JSON.parse(message.payloadString);
        } catch(e) { return; }

        if (data.tecnicoId !== MI_TECNICO_ID) {
            let contenido = data.tipo === "texto" 
                ? `<p class="msg-text">${data.mensaje}</p>` 
                : `<img src="${data.mensaje}" class="chat-img">`;

            chat.innerHTML += `
                <div class="msg-row rec-row">
                    <img src="${data.fotoPerfil}" class="mini-profile">
                    <div class="msg-rec">
                        <span class="user-id">${data.nombre}</span>
                        ${contenido}
                    </div>
                </div>`;
            chat.scrollTop = chat.scrollHeight;
        }
    };

    client.connect({
        onSuccess: () => {
            document.getElementById("status-dot").className = "dot connected";
            document.getElementById("chat-box").innerHTML = '<div class="welcome-msg">Protocolo listo. Identifícate para iniciar.</div>';
            client.subscribe(TOPIC);
        },
        useSSL: true
    });

    function updateProfilePic(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                miFotoBase64 = e.target.result;
                document.getElementById("profilePreview").src = miFotoBase64;
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function enviar(tipo = "texto", contenido = null) {
        const input = document.getElementById("mensajeInput");
        const userField = document.getElementById("userInput");
        const msj = contenido || input.value;
        
        if(!msj && tipo === "texto") return;

        const payload = {
            tecnicoId: MI_TECNICO_ID,
            nombre: userField.value.trim() || "Anónimo",
            fotoPerfil: miFotoBase64,
            tipo: tipo,
            mensaje: msj
        };

        const message = new Paho.MQTT.Message(JSON.stringify(payload));
        message.destinationName = TOPIC;
        client.send(message);

        const chat = document.getElementById("chat-box");
        let htmlContenido = tipo === "texto" 
            ? `<p class="msg-text">${msj}</p>` 
            : `<img src="${msj}" class="chat-img">`;

        chat.innerHTML += `
            <div class="msg-row me-row">
                <div class="msg-me">
                    ${htmlContenido}
                </div>
            </div>`;
        chat.scrollTop = chat.scrollHeight;
        input.value = "";
    }

    function sendImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => enviar("imagen", e.target.result);
            reader.readAsDataURL(input.files[0]);
        }
    }
</script>
</body>
</html>
