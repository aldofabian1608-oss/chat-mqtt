<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOAT</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="card">
        <header class="app-header">
            <div id="status-dot" class="dot disconnected"></div>
            <h1>GOAT<span class="highlight">CHAT</span></h1>
            <input type="text" id="userInput" placeholder="Tu Nombre..." class="user-tag-input">
        </header>

        <div id="chat-box">
            <div class="welcome-msg">
                <span id="connection-text">Iniciando protocolo de enlace seguro...</span>
            </div>
        </div>

        <div class="input-group">
            <input type="text" id="mensajeInput" placeholder=">_ Ingresa tu transmisión..." onkeypress="if(event.key==='Enter') enviar()">
            <button onclick="enviar()">ENVIAR</button>
        </div>
    </div>
</div>

<script>
    const BROKER = "broker.hivemq.com";
    const PORT = 8884; 
    const TOPIC = "Chat"; 
    
    // Generamos un ID único interno para evitar que el mensaje se repita al recibirlo
    const MI_TECNICO_ID = "CL_" + Math.random().toString(16).substr(2, 4).toUpperCase();
    const client = new Paho.MQTT.Client(BROKER, PORT, "client_" + MI_TECNICO_ID);

    client.onMessageArrived = (message) => {
        const chat = document.getElementById("chat-box");
        
        // El formato recibido es: ID_TECNICO|NOMBRE_USUARIO:MENSAJE
        const data = message.payloadString.split("|");
        const remitenteTecnicoId = data[0];
        
        const contenido = data[1].split(":");
        const nombreUsuario = contenido[0];
        const textoMensaje = contenido.slice(1).join(":");

        // FILTRO: Solo mostramos si el mensaje NO es el que enviamos nosotros
        if (remitenteTecnicoId !== MI_TECNICO_ID) {
            chat.innerHTML += `
                <div class="msg-row rec-row">
                    <div class="msg-rec">
                        <span class="user-id">${nombreUsuario}</span>
                        <p class="msg-text">${textoMensaje}</p>
                    </div>
                </div>`;
            chat.scrollTop = chat.scrollHeight;
        }
    };

    client.onConnectionLost = () => {
        document.getElementById("status-dot").className = "dot disconnected";
    };

    client.connect({
        onSuccess: () => {
            document.getElementById("status-dot").className = "dot connected";
            document.getElementById("chat-box").innerHTML = `<div class="welcome-msg connected-text">Conexión establecida con éxito.</div>`;
            client.subscribe(TOPIC);
        },
        useSSL: true,
        timeout: 10
    });

    function enviar() {
        const input = document.getElementById("mensajeInput");
        const userField = document.getElementById("userInput");
        
        if(!input.value.trim()) return;

        // Si el usuario no escribe nombre, asignamos uno por defecto
        const nombreChat = userField.value.trim() || "Anónimo";

        // Estructura del mensaje: ID_TECNICO|NOMBRE:MENSAJE
        const rawMessage = `${MI_TECNICO_ID}|${nombreChat}:${input.value}`;
        
        const message = new Paho.MQTT.Message(rawMessage);
        message.destinationName = TOPIC;
        client.send(message);

        // Mostramos nuestro propio mensaje en pantalla inmediatamente
        const chat = document.getElementById("chat-box");
        chat.innerHTML += `
            <div class="msg-row me-row">
                <div class="msg-me">
                    <span class="user-id">Tú (${nombreChat})</span>
                    <p class="msg-text">${input.value}</p>
                </div>
            </div>`;
        chat.scrollTop = chat.scrollHeight;
        input.value = "";
        
        // Bloqueamos el input de usuario tras el primer mensaje para mantener identidad
        userField.readOnly = true;
        userField.style.opacity = "0.6";
    }
</script>
</body>
</html>
